name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Reconcile parser regression suite
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install PyYAML
        run: python -m pip install --upgrade pip pyyaml

      - name: Run reconcile parser tests
        run: python3 scripts/test_reconcile_parsing.py

      - name: Run lessons-routing regression test
        run: python3 scripts/test_lessons_routing.py

      - name: Run doctor + config test
        run: python3 scripts/test_doctor.py

      - name: Run content-integrity test
        run: python3 scripts/test_integrity.py

      - name: Run migrate (plan/apply/rollback) test
        run: python3 scripts/test_migrate.py

      - name: Run file-reservations test
        run: python3 scripts/test_reservations.py

      - name: Run contract-lifecycle test
        run: python3 scripts/test_contracts.py

      - name: Run Polis Bench test
        run: python3 scripts/test_benchmark.py

      - name: Run context-packet test
        run: python3 scripts/test_context.py

      - name: Run guardrails + learning-benchmark test
        run: python3 scripts/test_guardrails.py

      - name: Run packaging-data sync test
        run: python3 scripts/test_packaging.py

      - name: Run serve + report (Replay) test
        run: python3 scripts/test_serve_report.py

      - name: Run MCP server test
        run: python3 scripts/test_mcp_server.py

      - name: Run extension thin-client state test (node)
        run: node editors/antigravity/test_state.js

      - name: Smoke-test init_polis.py
        run: |
          mkdir -p /tmp/smoke
          python3 scripts/init_polis.py \
            --project-root /tmp/smoke \
            --agent-id smoke-test-citizen \
            --vendor anthropic \
            --model claude-opus-4-7 \
            --tool "ci runner" \
            --project-name "CI Smoke"
          test -f /tmp/smoke/_polis/CONSTITUTION.md
          test -f /tmp/smoke/_polis/citizens/smoke-test-citizen/capability_card.yml
          test -f /tmp/smoke/CLAUDE.md
          test -f /tmp/smoke/AGENTS.md
          test -f /tmp/smoke/GEMINI.md

      - name: Idempotency check
        run: |
          python3 scripts/init_polis.py \
            --project-root /tmp/smoke \
            --agent-id smoke-test-citizen \
            --vendor anthropic \
            --model claude-opus-4-7 \
            --tool "ci runner" \
            --project-name "CI Smoke" \
            > /tmp/run2.log
          # Re-running with the same agent-id should mark all files as "exists" (no overwrite).
          ! grep -E '^\s*\+ ' /tmp/run2.log

      - name: Invalid agent-id is rejected before any disk write
        run: |
          ! python3 scripts/init_polis.py \
            --project-root /tmp/smoke \
            --agent-id BAD \
            --vendor anthropic \
            --model x --tool x --project-name x 2>/dev/null
